services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: physio-postgres
    environment:
      POSTGRES_DB: physiotracker
      POSTGRES_USER: physio
      POSTGRES_PASSWORD: physio_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physio -d physiotracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - physio-network

  # Backend API
  backend:
    build: ./backend
    container_name: physio-backend
    environment:
      DATABASE_URL: "postgresql://physio:physio_secret_2024@postgres:5432/physiotracker?schema=public"
      JWT_SECRET: "physio-tracker-jwt-secret-change-in-production-2024"
      JWT_EXPIRES_IN: "1h"
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: "https://physio.kitt.deploid.io"
    ports:
      - "3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - physio-network

  # Frontend
  frontend:
    build: ./frontend
    container_name: physio-frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: "https://physio.kitt.deploid.io/api"
    ports:
      - "3003:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - physio-network

volumes:
  postgres_data:

networks:
  physio-network:
    name: physio-network
